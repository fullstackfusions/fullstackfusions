<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blog — fullstackfusions</title>
    <link rel="icon" sizes="32x32" type="image/png" href="/images/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/blog/assets/blog.css" />
    <script>
      (function () {
        const s = localStorage.getItem("theme");
        if (
          s === "dark" ||
          (!s && window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <style>
      body {
        font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      }
      .section-heading {
        position: relative;
        padding-bottom: 0.6rem;
      }
      .section-heading::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: 0;
        width: 36px;
        height: 3px;
        background: #3b82f6;
        border-radius: 2px;
      }
      #theme-toggle {
        position: fixed;
        bottom: 1rem;
        right: 1rem;
        z-index: 999;
        width: 2.25rem;
        height: 2.25rem;
        border-radius: 50%;
        border: none;
        background: #2563eb;
        cursor: pointer;
        font-size: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s;
      }
      #theme-toggle:hover {
        background: #3b82f6;
      }
      html.dark #theme-toggle {
        background: #2563eb;
        border: none;
      }
      html.dark #theme-toggle:hover {
        background: #3b82f6;
      }
      html.dark {
        color-scheme: dark;
      }
      html.dark body {
        background-color: #0f172a;
        color: #e2e8f0;
      }
      html.dark .bg-gray-50 {
        background-color: #0f172a;
      }
      html.dark .bg-white {
        background-color: #1e293b;
      }
      html.dark .bg-gray-900 {
        background-color: #020617;
      }
      html.dark .text-gray-900 {
        color: #f1f5f9;
      }
      html.dark .text-gray-800 {
        color: #e2e8f0;
      }
      html.dark .text-gray-700 {
        color: #cbd5e1;
      }
      html.dark .text-gray-600 {
        color: #94a3b8;
      }
      html.dark .text-gray-500 {
        color: #64748b;
      }
      html.dark .border-gray-200 {
        border-color: #334155;
      }
      html.dark .shadow-sm {
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      }
      html.dark .text-blue-600 {
        color: #60a5fa;
      }
      html.dark .section-heading::after {
        background: #60a5fa;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-gray-900">
    <button
      id="theme-toggle"
      onclick="toggleTheme()"
      aria-label="Toggle dark mode"
      title="Toggle dark/light mode"
    >
      <span id="theme-icon">&#x1F319;</span>
    </button>

    <div id="site-nav"></div>
    <script src="/components/navbar.js"></script>

    <main class="blog-container">
      <h1 class="text-3xl font-bold section-heading mb-6">Blog</h1>

      <div class="blog-controls">
        <input
          id="search-input"
          type="search"
          placeholder="Search posts by title, topic, or tag…"
          aria-label="Search blog posts"
          autocomplete="off"
          class="blog-search"
        />
        <div
          id="tag-filter"
          class="tag-filter-bar"
          aria-label="Filter by tag"
        ></div>
      </div>

      <p id="no-results" class="no-results" hidden>
        No posts match your search.
      </p>
      <ul id="post-list" class="post-list"></ul>
    </main>

    <script>
      (function () {
        // ── Theme ─────────────────────────────────────────────
        function toggleTheme() {
          const d = document.documentElement.classList.toggle("dark");
          localStorage.setItem("theme", d ? "dark" : "light");
          document.getElementById("theme-icon").textContent = d ? "☀️" : "🌙";
        }
        window.toggleTheme = toggleTheme;
        document.getElementById("theme-icon").textContent =
          document.documentElement.classList.contains("dark") ? "☀️" : "🌙";

        // ── Helpers ───────────────────────────────────────────
        function esc(s) {
          return String(s)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;");
        }

        function formatDate(dateStr) {
          const [y, m, d] = dateStr.split("-").map(Number);
          return new Date(y, m - 1, d).toLocaleDateString("en-US", {
            year: "numeric",
            month: "long",
            day: "numeric",
          });
        }

        // ── State ─────────────────────────────────────────────
        let allPosts = [];
        let activeTag = location.hash
          ? decodeURIComponent(location.hash.slice(1))
          : null;
        let searchQuery = "";

        // ── Render posts ──────────────────────────────────────
        function renderPosts() {
          const list = document.getElementById("post-list");
          const noResults = document.getElementById("no-results");
          const q = searchQuery.trim().toLowerCase();

          const filtered = allPosts.filter((post) => {
            const matchesTag = !activeTag || post.tags.includes(activeTag);
            const matchesSearch =
              !q ||
              post.title.toLowerCase().includes(q) ||
              post.description.toLowerCase().includes(q) ||
              post.tags.some((t) => t.toLowerCase().includes(q));
            return matchesTag && matchesSearch;
          });

          if (filtered.length === 0) {
            list.innerHTML = "";
            noResults.hidden = false;
            return;
          }
          noResults.hidden = true;
          list.innerHTML = filtered
            .map(
              (post) => `<li>
              <div class="post-meta">${esc(formatDate(post.date))}</div>
              <div class="post-title"><a href="${esc(post.url)}">${esc(post.title)}</a></div>
              <p class="text-gray-600 mt-1">${esc(post.description)}</p>
              <div class="post-tags">
                ${post.tags
                  .map(
                    (t) =>
                      `<button class="tag tag-clickable${t === activeTag ? " tag-active" : ""}" data-tag="${esc(t)}">${esc(t)}</button>`,
                  )
                  .join("")}
              </div>
            </li>`,
            )
            .join("");

          list.querySelectorAll(".tag-clickable").forEach((btn) => {
            btn.addEventListener("click", () => setTag(btn.dataset.tag));
          });
        }

        // ── Render tag bar ────────────────────────────────────
        function renderTagBar() {
          const bar = document.getElementById("tag-filter");
          const allTags = [...new Set(allPosts.flatMap((p) => p.tags))].sort();
          bar.innerHTML =
            `<button class="tag-pill${!activeTag ? " active" : ""}" data-tag="">All</button>` +
            allTags
              .map(
                (t) =>
                  `<button class="tag-pill${t === activeTag ? " active" : ""}" data-tag="${esc(t)}">${esc(t)}</button>`,
              )
              .join("");

          bar.querySelectorAll(".tag-pill").forEach((btn) => {
            btn.addEventListener("click", () =>
              setTag(btn.dataset.tag || null),
            );
          });
        }

        // ── Set active tag ────────────────────────────────────
        function setTag(tag) {
          activeTag = tag || null;
          history.replaceState(
            null,
            "",
            activeTag ? "#" + encodeURIComponent(activeTag) : location.pathname,
          );
          renderTagBar();
          renderPosts();
        }

        // ── Hash navigation (back/forward) ────────────────────
        window.addEventListener("hashchange", () => {
          activeTag = location.hash
            ? decodeURIComponent(location.hash.slice(1))
            : null;
          renderTagBar();
          renderPosts();
        });

        // ── Search input ──────────────────────────────────────
        document
          .getElementById("search-input")
          .addEventListener("input", (e) => {
            searchQuery = e.target.value;
            renderPosts();
          });

        // ── Load feed.json ────────────────────────────────────
        fetch("/blog/feed.json")
          .then((r) => r.json())
          .then((posts) => {
            allPosts = posts;
            renderTagBar();
            renderPosts();
          })
          .catch(() => {
            document.getElementById("post-list").innerHTML =
              '<li style="padding:1.5rem 0;color:#6b7280">Failed to load posts.</li>';
          });
      })();
    </script>
  </body>
</html>
